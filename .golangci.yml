version: "2"
run:
  timeout: 2m
linters:
  enable:
    - errorlint
    - godot
    - gosec
    - misspell
    - revive
    - funcorder
    - modernize
  settings:
    errcheck:
      check-type-assertions: true
    misspell:
      locale: US
    revive:
      rules:
        - name: unexported-return
          disabled: true
        - name: exported
          disabled: false
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # gosec G124: test fixtures construct http.Cookie literals to exercise
      # cookie store behavior, not transport security. Secure/HttpOnly/SameSite
      # are not relevant in this context.
      - linters:
          - gosec
        text: "G124"
        path: _test\.go
    paths:
      - tmpmod
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
